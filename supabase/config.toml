# Supabase project config.
#
# The PRIMARY purpose of this file is to pin each Edge Function's `verify_jwt`
# flag in the repo, so `supabase functions deploy` is deterministic and a blind
# redeploy can never silently re-enable JWT verification on a function that must
# stay open. (That exact failure took down course geocoding: geocode-postcode is
# called server-to-server with the injected SUPABASE_SERVICE_ROLE_KEY, which is a
# non-JWT `sb_secret_…` under the new API-key format, so a verify_jwt gateway
# rejects it with 401.)
#
# verify_jwt = false  →  the function authenticates itself in-code and/or is
#                        called by Stripe / a browser redirect / another function
#                        with a non-JWT credential. The gateway must NOT gate it.
# verify_jwt = true   →  browser-called with a valid Supabase user JWT (default).

project_id = "daisy-platform"

# --- Public / self-authenticating (verify_jwt = false) ----------------------

[functions.geocode-postcode]
# Called server-to-server from create/update-course-instance with the service
# key (non-JWT). Checks for a Bearer header in-code; Google key stays server-side.
verify_jwt = false

[functions.stripe-oauth-callback]
# Browser redirect target from Stripe's OAuth flow — carries no Supabase JWT.
# Authenticates via the HMAC-signed `state` param instead.
verify_jwt = false

[functions.stripe-webhook]
# Called by Stripe's servers — authenticated by the Stripe signature, not a JWT.
verify_jwt = false

[functions.get-public-courses]
# Public booking-widget read API (M3). No user — anon callers. Rate-limited in-code.
verify_jwt = false

[functions.process-interest-form]
# Public booking-widget interest-form capture (M3). No user. Rate-limited in-code.
verify_jwt = false

[functions.validate-discount]
# Public booking-widget live discount check (M3). Read-only; no uses_count bump.
verify_jwt = false

[functions.create-checkout-session]
# Public checkout for the widget + /book/:token (M3). Writes a pending booking,
# creates Stripe Checkout on the franchisee's connected account. No user auth.
verify_jwt = false

[functions.submit-medical-declaration]
# Public medical-app submit (M3). Encrypts health data; consent-gated. No user auth.
verify_jwt = false

[functions.purge-medical-declarations]
# HQ-only manual GDPR purge (M3). The scheduled purge is a pg_cron SQL job (029).
verify_jwt = true

[functions.decrypt-medical-declaration]
# HQ-only decrypt of one declaration (M3). JWT verified; is_hq gate in-code.
verify_jwt = true

[functions.send-emails]
# Hourly cron (M3). pg_cron → pg_net with CRON_SECRET; gated in-code. No user JWT.
verify_jwt = false

[functions.unsubscribe]
# Public unsubscribe/resubscribe landing (Kartra migration). Clicked from email
# footers / List-Unsubscribe with no Supabase session; HMAC token auth in-code.
verify_jwt = false

[functions.postmark-webhook]
# Called by Postmark's servers (delivery/open/bounce/spam events). Shared
# secret in the URL query; no JWT.
verify_jwt = false

[functions.log-client-event]
# Public browser-error ingestion (all three frontends) → da_system_logs.
# No user session on public pages; strict shape + per-IP rate limit in-code.
verify_jwt = false

[functions.gdpr-erasure]
# HQ-only GDPR right-to-erasure (M3). JWT verified; is_hq gate in-code.
verify_jwt = true

[functions.gdpr-subject-access]
# HQ-only GDPR subject-access export (M3). JWT verified; is_hq gate in-code.
verify_jwt = true

# --- Browser-called with a franchisee/HQ JWT (verify_jwt = true) ------------

